<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查看图片</title>
    <style>
        /* 清除留白，设置纯黑背景，开启弹性居中布局 */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            background-color: #000000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        /* 让图片最大只能和屏幕一样大，且按比例缩放不拉伸 */
        img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
        }
    </style>
</head>
<body>
    <img src="1.jpg" alt="展示的图片">
</body>
</html>
